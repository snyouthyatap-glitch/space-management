<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공간 오픈 루틴 마스터</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="container">
        <header class="header">
            <h1>Space Opening Routine</h1>
            <p>오늘의 공간 오픈을 위한 4단계 루틴입니다. 순서대로 진행해주세요.</p>
        </header>

        <section class="routine-steps">
            <!-- Step 1 -->
            <div class="step-card" id="step-1">
                <div class="step-number">01</div>
                <div class="step-content">
                    <h2>네이버 스마트스토어</h2>
                    <p>예약 내역 한달치를 다운로드합니다.</p>
                    <a href="https://partner.booking.naver.com/bizes/1002115/booking-list-view?countFilter=FIXEDWAITING" target="_blank" class="routine-link" data-step="1">스토어 바로가기</a>
                </div>
                <div class="step-status">
                    <span class="status-icon"></span>
                </div>
            </div>

            <!-- Step 2 -->
            <div class="step-card" id="step-2">
                <div class="step-number">02</div>
                <div class="step-content">
                    <h2>구글 드라이브</h2>
                    <p>다운로드한 CSV 파일을 업로드합니다.</p>
                    <a href="https://drive.google.com/drive/folders/1-6edz08Fl7WrhoUUkzE8u2GDKoj_90Nr?usp=drive_link" target="_blank" class="routine-link" data-step="2">드라이브 바로가기</a>
                </div>
                <div class="step-status">
                    <span class="status-icon"></span>
                </div>
            </div>

            <!-- Step 3 -->
            <div class="step-card" id="step-3">
                <div class="step-number">03</div>
                <div class="step-content">
                    <h2>구글 시트</h2>
                    <p>시트를 열고 [CSV 파싱] 버튼을 누릅니다.</p>
                    <a href="https://docs.google.com/spreadsheets/d/1ErbIUwhL-UatarQxeYhCP79RF0f0GrlFLaD1WAw13BQ/edit?usp=sharing" target="_blank" class="routine-link" data-step="3">시트 바로가기</a>
                </div>
                <div class="step-status">
                    <span class="status-icon"></span>
                </div>
            </div>

            <!-- Step 4 -->
            <div class="step-card" id="step-4">
                <div class="step-number">04</div>
                <div class="step-content">
                    <h2>공간관리 사이트</h2>
                    <p>최종 확인 및 관리를 진행합니다.</p>
                    <a href="https://snyouthyatap-glitch.github.io/space-management/" target="_blank" class="routine-link" data-step="4">사이트 바로가기</a>
                </div>
                <div class="step-status">
                    <span class="status-icon"></span>
                </div>
            </div>
        </section>

        <footer class="footer">
            <button id="reset-routine">루틴 초기화</button>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
